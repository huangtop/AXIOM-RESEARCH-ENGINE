name: Build Public Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * 1-5"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .[dev]
      - run: axiom validate
      - run: axiom build-public
      - run: pytest -q
      - name: Commit public data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/public
          git diff --cached --quiet || git commit -m "chore(data): rebuild public JSON"
          git push
